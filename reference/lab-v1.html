<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>虛擬漏水實驗室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1216;color:#dfe7ee;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;
display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:10px;user-select:none}
h1{font-size:17px;font-weight:700;letter-spacing:3px;color:#9fc7bd;margin:2px 0 8px}
#tabs{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.tab{padding:7px 13px;border-radius:8px;border:1px solid #2a3640;background:#1a2128;color:#cfd8e0;font-size:13px;cursor:pointer}
.tab.on{border-color:#66D3C0;background:#0e3a31;color:#9ff0dd}
section{display:none;width:100%;max-width:640px;flex-direction:column;align-items:center}
section.on{display:flex}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center;margin-bottom:6px;font-size:13px;color:#aebbc6}
.ctrl label{display:flex;align-items:center;gap:5px}
input[type=range]{width:100px;accent-color:#66D3C0}
.btn{padding:6px 12px;border-radius:8px;border:1px solid #2a3640;background:#1a2128;color:#cfd8e0;font-size:13px;cursor:pointer}
.btn.sel{border-color:#66D3C0;background:#0e3a31;color:#9ff0dd}
.btn.warn{border-color:#5a3030;background:#2a1818;color:#e0a0a0}
canvas{border-radius:10px;border:1px solid #263340;display:block;max-width:100%;height:auto;background:#0a0d10}
.note{background:#141b21;border:1px solid #223040;border-radius:8px;padding:8px 12px;font-size:13px;color:#aebbc6;
width:100%;min-height:46px;line-height:1.7;margin-top:6px}
.note b{color:#ffd27b}.note .ok{color:#7be0c3}.note .bad{color:#ff8a78}
.val{color:#66D3C0;font-weight:600;min-width:46px;display:inline-block}
</style>
</head>
<body>
<h1>虛 擬 漏 水 實 驗 室</h1>
<div id="tabs"></div>

<!-- M1 正負水壓 -->
<section id="m1">
<div class="ctrl">
  <label>水壓 <input type="range" id="p1" min="1" max="10" value="4"><span class="val" id="p1v">4</span></label>
  <span>塗膜位置:</span>
  <button class="btn" data-c="none">無</button>
  <button class="btn" data-c="left">迎水面(正水壓工法)</button>
  <button class="btn" data-c="right">背水面(負水壓工法)</button>
  <span>材料:</span>
  <button class="btn" data-m="pu">PU皮膜型</button>
  <button class="btn" data-m="cr">滲透結晶型</button>
  <button class="btn warn" id="r1">重置</button>
</div>
<canvas id="c1" width="620" height="340"></canvas>
<div class="note" id="n1"></div>
</section>

<!-- M2 毛細 -->
<section id="m2">
<div class="ctrl">
  <label>中間裂縫寬度 <input type="range" id="p2" min="0.1" max="5" step="0.1" value="1"><span class="val" id="p2v">1.0 mm</span></label>
</div>
<canvas id="c2" width="620" height="340"></canvas>
<div class="note">毛細爬升高度 h ≈ 15 ÷ 縫寬(mm)。<b>縫越細,水爬越高</b>——這就是為什麼髮絲裂縫(0.1mm)比明顯裂縫更危險:理論爬升150mm以上,牆腳水可以默默吸到牆體深處。壁癌常見於牆腳30~90cm,正是毛細水帶著鹽分上來析晶的範圍。</div>
</section>

<!-- M3 窗框風雨試驗 -->
<section id="m3">
<div class="ctrl">
  <label>風速 <input type="range" id="p3" min="0" max="32" value="10"><span class="val" id="p3v"></span></label>
  <span>窗框填縫:</span>
  <button class="btn" data-s="good">完好(耐50)</button>
  <button class="btn" data-s="old">老化龜裂(耐15)</button>
  <button class="btn warn" id="r3">重置滲水</button>
</div>
<canvas id="c3" width="620" height="340"></canvas>
<div class="note" id="n3"></div>
</section>

<!-- M4 冷凝 vs 漏水 -->
<section id="m4">
<div class="ctrl" id="ctl4">
  <label>室內溫度 <input type="range" id="t4" min="20" max="32" value="28"><span class="val" id="t4v"></span></label>
  <label>相對濕度 <input type="range" id="h4" min="40" max="95" value="75"><span class="val" id="h4v"></span></label>
  <label>牆面溫度 <input type="range" id="w4" min="8" max="30" value="20"><span class="val" id="w4v"></span></label>
  <button class="btn" id="lk4">模擬隔戶漏水:關</button>
</div>
<div class="ctrl">
  <button class="btn" id="q4">🎯 出題測驗</button>
  <span id="qbtns4" style="display:none">
    <button class="btn" data-a="cond">這是冷凝</button>
    <button class="btn" data-a="leak">這是漏水</button>
  </span>
</div>
<canvas id="c4" width="620" height="340"></canvas>
<div class="note" id="n4"></div>
</section>

<!-- M5 檢測員模式 -->
<section id="m5">
<div class="ctrl">
  <span>儀器:</span>
  <button class="btn sel" data-t="moist">💧 水分計(點牆量測)</button>
  <button class="btn" data-t="ir">🌡 熱像儀</button>
  <button class="btn" id="spray5">🚿 外牆灑水試驗</button>
  <button class="btn warn" id="next5">下一題</button>
</div>
<canvas id="c5" width="620" height="340"></canvas>
<div class="ctrl">
  <span>診斷:</span>
  <button class="btn" data-d="0">窗框滲漏</button>
  <button class="btn" data-d="1">毛細上升(壁癌)</button>
  <button class="btn" data-d="2">負水壓滲漏</button>
  <button class="btn" data-d="3">冷凝結露</button>
</div>
<div class="note" id="n5"></div>
</section>

<script>
//=============== 共用 ===============
const TABS=[['m1','正負水壓'],['m2','毛細現象'],['m3','窗框風雨試驗'],['m4','冷凝vs漏水'],['m5','檢測員模式']];
let active='m1';
const tabsDiv=document.getElementById('tabs');
TABS.forEach(([id,name])=>{
  const b=document.createElement('button');b.className='tab'+(id===active?' on':'');b.textContent=name;
  b.onclick=()=>{active=id;document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',TABS[i][0]===id));
    document.querySelectorAll('section').forEach(s=>s.classList.toggle('on',s.id===id));};
  tabsDiv.appendChild(b);
});
document.getElementById('m1').classList.add('on');
const $=id=>document.getElementById(id);
const R=(a,b)=>a+Math.random()*(b-a);

//=============== M1 正負水壓 ===============
const c1=$('c1'),x1=c1.getContext('2d');
let M1={coat:'none',mat:'pu',drops:[],leak:0,blister:0,popped:false,cryst:0};
document.querySelectorAll('#m1 [data-c]').forEach(b=>b.onclick=()=>{M1.coat=b.dataset.c;M1.blister=0;M1.popped=false;M1.cryst=0;
  document.querySelectorAll('#m1 [data-c]').forEach(x=>x.classList.toggle('sel',x===b));});
document.querySelectorAll('#m1 [data-m]').forEach(b=>b.onclick=()=>{M1.mat=b.dataset.m;M1.blister=0;M1.popped=false;M1.cryst=0;
  document.querySelectorAll('#m1 [data-m]').forEach(x=>x.classList.toggle('sel',x===b));});
document.querySelector('#m1 [data-c="none"]').classList.add('sel');
document.querySelector('#m1 [data-m="pu"]').classList.add('sel');
$('r1').onclick=()=>{M1.drops=[];M1.leak=0;M1.blister=0;M1.popped=false;M1.cryst=0;};
$('p1').oninput=e=>$('p1v').textContent=e.target.value;

function m1Step(){
  const p=+$('p1').value;
  const WX=290,WW=40,CY=164;
  // 物理判定
  let leakRate=0,msg='';
  if(M1.coat==='none'){ leakRate=p*0.05; msg='<b>未做防水</b>:水壓直接把水從裂縫推進室內。壓力越大,滲水越快。'; }
  else if(M1.coat==='left'){ leakRate=0; msg='<span class="ok">✅ 迎水面施作(正水壓工法)</span>:水壓把塗膜「壓」在結構上,膜越壓越貼。屋頂PU就是這個原理——<b>水壓是你的朋友</b>。'; }
  else { // 背水面
    if(M1.mat==='pu'){
      if(!M1.popped){
        M1.blister=Math.min(30,M1.blister+p*0.012);
        msg=`<b>背水面+皮膜型</b>:水穿過結構,從背面「頂」塗膜。起鼓中…(${(M1.blister/30*100|0)}%)。<b>水壓變成你的敵人</b>。`;
        if(M1.blister>=30){M1.popped=true;for(let k=0;k<36;k++)M1.drops.push({x:336,y:CY,vx:R(0.5,3),vy:R(-2,1)});}
      } else { leakRate=p*0.05; msg='<span class="bad">💥 皮膜被負水壓頂破!</span>這就是為什麼地下室/浴室背水面用一般PU會失敗——皮膜型材料只能附著,擋不住背後的水壓。'; }
    } else {
      M1.cryst=Math.min(1,M1.cryst+0.003);
      leakRate=p*0.05*(1-M1.cryst);
      msg=M1.cryst<1? `<b>背水面+滲透結晶型</b>:活性成分順著水的毛細通路滲入結構,在孔隙內結晶填塞…(${(M1.cryst*100|0)}%)。它不靠附著,靠<b>長進混凝土裡</b>。`
        : '<span class="ok">✅ 結晶完成,毛細孔被填塞,負水壓側成功止水。</span>負水壓面的正解:滲透結晶型/注入工法,不是皮膜。';
    }
  }
  if(Math.random()<leakRate) M1.drops.push({x:336,y:CY+R(-2,2),vx:R(0.5,1)+p*0.12,vy:R(-0.3,0.3)});
  M1.drops.forEach(d=>{d.vy+=0.18;d.x+=d.vx;d.y+=d.vy;if(d.y>316){d.y=316;d.vy=0;d.vx*=0.9;}});
  if(M1.drops.length>400)M1.drops.splice(0,M1.drops.length-400);
  M1.leak+=leakRate;
  $('n1').innerHTML=msg+`<br>累積滲水:<b>${M1.leak.toFixed(0)} 單位</b>`;

  // draw
  x1.fillStyle='#0a0d10';x1.fillRect(0,0,620,340);
  // 左水體
  const lvl=320-(60+p*22);
  const grd=x1.createLinearGradient(0,lvl,0,320);grd.addColorStop(0,'#3a8fd4');grd.addColorStop(1,'#1c4a7a');
  x1.fillStyle=grd;x1.fillRect(20,lvl,WX-20,320-lvl);
  x1.fillStyle='#6fb6e8';x1.fillRect(20,lvl,WX-20,3);
  x1.fillStyle='#7d8c98';x1.font='12px sans-serif';
  x1.fillText('水(迎水面)',60,lvl-8);x1.fillText('室內(背水面)',420,40);
  // 牆
  x1.fillStyle='#5e646c';x1.fillRect(WX,20,WW,300);
  for(let y=30;y<320;y+=18){x1.fillStyle='rgba(0,0,0,0.12)';x1.fillRect(WX,y,WW,1);}
  // 結晶染色
  if(M1.cryst>0){x1.fillStyle=`rgba(150,120,200,${M1.cryst*0.5})`;x1.fillRect(WX,CY-30,WW,60);}
  // 裂縫
  x1.fillStyle=M1.cryst>=1?'#7a6a9a':'#101418';x1.fillRect(WX,CY-3,WW,7);
  // 塗膜
  if(M1.coat==='left'){x1.fillStyle=M1.mat==='pu'?'#2a8f6a':'#9a7ad0';x1.fillRect(WX-6,20,6,300);}
  if(M1.coat==='right'&&!M1.popped){
    x1.fillStyle=M1.mat==='pu'?'#2a8f6a':'#9a7ad0';x1.fillRect(WX+WW,20,6,300);
    if(M1.blister>0&&M1.mat==='pu'){x1.beginPath();x1.arc(WX+WW+3,CY,M1.blister,Math.PI*1.5,Math.PI*0.5);
      x1.fillStyle='#2a8f6a';x1.fill();x1.strokeStyle='#46c79a';x1.stroke();
      x1.fillStyle='#ffd27b';x1.font='12px sans-serif';x1.fillText('起鼓!',WX+WW+M1.blister+6,CY+4);}
  }
  if(M1.popped){x1.fillStyle='#ff8a78';x1.font='13px sans-serif';x1.fillText('💥 塗膜破裂',WX+WW+10,CY-14);}
  // 壓力箭頭
  x1.strokeStyle='rgba(120,190,240,0.7)';x1.lineWidth=2;
  for(let k=0;k<p;k++){const ay=lvl+15+k*((315-lvl)/Math.max(p,1));
    x1.beginPath();x1.moveTo(WX-30,ay);x1.lineTo(WX-8,ay);x1.lineTo(WX-14,ay-4);x1.moveTo(WX-8,ay);x1.lineTo(WX-14,ay+4);x1.stroke();}
  // 滲水粒子
  x1.fillStyle='#5db2e8';M1.drops.forEach(d=>x1.fillRect(d.x,d.y,3,3));
  // 地板
  x1.fillStyle='#222a32';x1.fillRect(WX+WW,320,620-WX-WW,20);x1.fillRect(0,320,WX,20);
}

//=============== M2 毛細 ===============
const c2=$('c2'),x2=c2.getContext('2d');
let M2={cur:[0,0,0]};
$('p2').oninput=e=>$('p2v').textContent=(+e.target.value).toFixed(1)+' mm';
function m2Step(){
  const ws=[2.0,+$('p2').value,0.2]; // mm
  const targets=ws.map(w=>Math.min(220,15/w*1.5)); // px (1.5px = 1mm)
  M2.cur=M2.cur.map((c,i)=>c+(targets[i]-c)*0.03);
  x2.fillStyle='#0a0d10';x2.fillRect(0,0,620,340);
  // 水槽
  const WY=280;
  const g=x2.createLinearGradient(0,WY,0,335);g.addColorStop(0,'#3a8fd4');g.addColorStop(1,'#1c4a7a');
  x2.fillStyle=g;x2.fillRect(10,WY,600,55);
  x2.fillStyle='#6fb6e8';x2.fillRect(10,WY,600,3);
  const cxs=[150,310,470],names=['一般裂縫','你調的裂縫','髮絲裂縫'];
  cxs.forEach((cx,i)=>{
    const slitPx=Math.max(2,ws[i]*6);
    // 混凝土塊
    x2.fillStyle='#5e646c';
    x2.fillRect(cx-65,55,65-slitPx/2,WY-55);
    x2.fillRect(cx+slitPx/2,55,65-slitPx/2,WY-55);
    x2.fillStyle='rgba(0,0,0,0.12)';
    for(let y=65;y<WY;y+=16){x2.fillRect(cx-65,y,130,1);}
    // 縫中水柱
    const h=M2.cur[i];
    x2.fillStyle='#4aa3df';x2.fillRect(cx-slitPx/2,WY-h,slitPx,h+2);
    x2.beginPath();x2.ellipse(cx,WY-h,slitPx/2+1,3,0,0,7);x2.fillStyle='#7cc4ee';x2.fill();
    // 標示
    x2.fillStyle=i===1?'#66D3C0':'#8fa0ad';x2.font='13px sans-serif';x2.textAlign='center';
    x2.fillText(names[i],cx,40);
    x2.font='12px sans-serif';
    x2.fillText(`縫寬 ${ws[i].toFixed(1)}mm`,cx,WY+24);
    const hmm=Math.min(150,15/ws[i]);
    x2.fillText(`爬升 ${hmm>=150?'150+':hmm.toFixed(0)} mm`,cx,WY+40);
    x2.textAlign='left';
    // 高度線
    x2.strokeStyle='rgba(255,210,123,0.5)';x2.setLineDash([3,3]);
    x2.beginPath();x2.moveTo(cx-72,WY-h);x2.lineTo(cx+72,WY-h);x2.stroke();x2.setLineDash([]);
  });
  x2.fillStyle='#7d8c98';x2.font='12px sans-serif';x2.fillText('h ≈ 15 / d(mm)　水的表面張力 + 附著力 > 重力',20,20);
}

//=============== M3 窗框風雨試驗 ===============
const c3=$('c3'),x3=c3.getContext('2d');
let M3={rain:[],seal:'good',leak:0,stain:0};
document.querySelectorAll('#m3 [data-s]').forEach(b=>b.onclick=()=>{M3.seal=b.dataset.s;
  document.querySelectorAll('#m3 [data-s]').forEach(x=>x.classList.toggle('sel',x===b));});
document.querySelector('#m3 [data-s="good"]').classList.add('sel');
$('r3').onclick=()=>{M3.leak=0;M3.stain=0;};
const GRADES=[[10,'普通'],[15,'10級風'],[25,'強風'],[35,'颱風'],[50,'強颱']];
function m3Step(){
  const v=+$('p3').value, P=v*v/16; // kgf/m²
  $('p3v').textContent=v+' m/s';
  const cap=M3.seal==='good'?50:15;
  // 生雨
  for(let k=0;k<6;k++) M3.rain.push({x:R(-150,620),y:-5,vx:v*0.22+R(-0.3,0.3),vy:R(3,4.5),slide:false});
  const FX=200,FX2=420,FY=90,FY2=250;
  M3.rain.forEach(d=>{
    if(!d.slide){ d.x+=d.vx; d.y+=d.vy;
      if(d.x>FX&&d.x<FX2&&d.y>FY&&d.y<FY2){d.slide=true;d.vx=0;}
    } else {
      d.y+=1.6+v*0.05;
      if(d.y>=FY2-3){ // 到窗台
        if(P>cap&&Math.random()<0.05){M3.leak++;M3.stain=Math.min(1,M3.stain+0.004);d.y=999;}
        else{d.x+=(d.x<310?-2.2:2.2);if(d.x<FX-12||d.x>FX2+12){d.slide=false;d.vy=2;}}
        d.y=Math.min(d.y,FY2-3);
      }
    }
  });
  M3.rain=M3.rain.filter(d=>d.y<350&&d.x<640);
  if(M3.rain.length>700)M3.rain.splice(0,M3.rain.length-700);

  // draw
  x3.fillStyle='#11161b';x3.fillRect(0,0,620,340); // 外牆
  for(let y=0;y<340;y+=40)for(let xq=((y/40)%2)*40;xq<620;xq+=80){x3.strokeStyle='rgba(255,255,255,0.04)';x3.strokeRect(xq,y,80,40);}
  // 窗
  x3.fillStyle='#2a3a48';x3.fillRect(FX-14,FY-14,FX2-FX+28,FY2-FY+28); // 框
  const sky=x3.createLinearGradient(0,FY,0,FY2);sky.addColorStop(0,'#16222e');sky.addColorStop(1,'#0e1820');
  x3.fillStyle=sky;x3.fillRect(FX,FY,FX2-FX,FY2-FY); // 玻璃
  x3.strokeStyle='rgba(150,200,230,0.25)';x3.strokeRect(FX,FY,FX2-FX,FY2-FY);
  x3.fillStyle='#3a4a58';x3.fillRect(308,FY,6,FY2-FY);
  // 填縫帶
  x3.fillStyle=M3.seal==='good'?'#46c79a':'#a05050';
  x3.fillRect(FX-14,FY2+10,FX2-FX+28,4);
  if(M3.seal==='old'){x3.fillStyle='#0a0d10';for(let xq=FX-10;xq<FX2+10;xq+=14)x3.fillRect(xq,FY2+10,5,4);}
  // 室內滲水染色
  if(M3.stain>0){
    const sg=x3.createRadialGradient(310,FY2+22,5,310,FY2+22,120);
    sg.addColorStop(0,`rgba(40,80,120,${M3.stain*0.8})`);sg.addColorStop(1,'rgba(40,80,120,0)');
    x3.fillStyle=sg;x3.fillRect(FX-14,FY2+14,FX2-FX+28,90);
  }
  // 雨
  x3.strokeStyle='rgba(120,180,230,0.7)';x3.lineWidth=1.2;x3.beginPath();
  M3.rain.forEach(d=>{x3.moveTo(d.x,d.y);x3.lineTo(d.x-d.vx*1.5,d.y-(d.slide?2:d.vy*1.2));});
  x3.stroke();
  // HUD
  x3.fillStyle='#dfe7ee';x3.font='13px sans-serif';
  x3.fillText(`風壓 P = v²/16 = ${P.toFixed(1)} kgf/m²`,16,22);
  x3.fillText(`窗框耐水密:${cap} kgf/m²`,16,40);
  const over=P>cap;
  x3.fillStyle=over?'#ff8a78':'#7be0c3';
  x3.fillText(over?'⚠ 超過水密等級,正在滲水':'✓ 防線守住',16,58);
  let gtxt=GRADES.map(g=>(P>=g[0]?'●':'○')+g[0]).join(' ');
  x3.fillStyle='#7d8c98';x3.fillText('CNS等級 '+gtxt,16,330);
  $('n3').innerHTML=`室內滲水計數:<b>${M3.leak}</b>。風壓與風速是<b>平方關係</b>——風速加倍,壓力變四倍。`+
    (M3.seal==='old'?'<span class="bad">老化填縫在15 kgf/m²(約10級風)就潰堤,平常晴天完全看不出問題——這是「只有颱風天漏」的標準答案。</span>':'完好填縫可承受強颱級風壓50 kgf/m²。');
}

//=============== M4 冷凝 vs 漏水 ===============
const c4=$('c4'),x4=c4.getContext('2d');
let M4={dots:[],leakOn:false,leakProg:0,quiz:null};
$('lk4').onclick=()=>{M4.leakOn=!M4.leakOn;$('lk4').textContent='模擬隔戶漏水:'+(M4.leakOn?'開':'關');$('lk4').classList.toggle('sel',M4.leakOn);};
$('q4').onclick=()=>{
  M4.quiz={ans:Math.random()<0.5?'cond':'leak'};M4.dots=[];M4.leakProg=0;
  $('ctl4').style.opacity=0.25;$('ctl4').style.pointerEvents='none';$('qbtns4').style.display='inline';
  $('n4').innerHTML='🎯 牆面狀況生成中…觀察<b>分佈型態</b>後作答:冷凝還是漏水?';
};
document.querySelectorAll('#qbtns4 [data-a]').forEach(b=>b.onclick=()=>{
  if(!M4.quiz)return;
  const ok=b.dataset.a===M4.quiz.ans;
  $('n4').innerHTML=(ok?'<span class="ok">✅ 答對!</span>':'<span class="bad">❌ 答錯。</span>')+
  (M4.quiz.ans==='cond'
    ?'這是<b>冷凝</b>:水珠<b>均勻散佈</b>整面牆、顆粒狀、無特定源頭、跟天氣濕度連動。擦掉很快又出現。'
    :'這是<b>漏水</b>:濕痕<b>從單一源頭往下擴散</b>、有明確邊界、跟樓上/隔戶用水時間連動。')+
  '<br>判別三招:① 看型態(均勻vs放射) ② 摸溫度(冷凝面冰冷) ③ 貼塑膠膜24hr——膜內側濕=冷凝,膜外側濕=滲漏。';
  M4.quiz=null;$('ctl4').style.opacity=1;$('ctl4').style.pointerEvents='auto';$('qbtns4').style.display='none';
});
function m4Step(){
  let T,RH,TW,leak;
  if(M4.quiz){ if(M4.quiz.ans==='cond'){T=28;RH=88;TW=14;leak=false;} else {T=28;RH=60;TW=24;leak=true;} }
  else { T=+$('t4').value;RH=+$('h4').value;TW=+$('w4').value;leak=M4.leakOn;
    $('t4v').textContent=T+'°C';$('h4v').textContent=RH+'%';$('w4v').textContent=TW+'°C'; }
  const Td=T-(100-RH)/5;
  const cond=TW<=Td;
  if(cond){for(let k=0;k<4;k++)M4.dots.push({x:R(20,600),y:R(20,250),r:R(0.8,2.2),a:0});}
  M4.dots.forEach(d=>d.a=Math.min(0.8,d.a+0.01));
  if(!cond)M4.dots.splice(0,8);
  if(M4.dots.length>900)M4.dots.splice(0,M4.dots.length-900);
  M4.leakProg=leak?Math.min(1,M4.leakProg+0.004):Math.max(0,M4.leakProg-0.01);

  x4.fillStyle='#1a1f25';x4.fillRect(0,0,620,340);
  x4.fillStyle='#23292f';x4.fillRect(0,300,620,40); // 地板
  // 漏水痕
  if(M4.leakProg>0){
    const lp=M4.leakProg;
    for(let s=0;s<5;s++){
      const yy=60+s*lp*42;
      const g=x4.createRadialGradient(420,yy,4,420,yy,30+s*10*lp);
      g.addColorStop(0,`rgba(35,55,75,${0.55*lp})`);g.addColorStop(1,'rgba(35,55,75,0)');
      x4.fillStyle=g;x4.fillRect(320,20,220,290);
    }
    x4.fillStyle=`rgba(120,160,190,${lp*0.9})`;x4.beginPath();x4.arc(420,58,3,0,7);x4.fill();
  }
  // 冷凝水珠
  M4.dots.forEach(d=>{x4.fillStyle=`rgba(140,190,230,${d.a})`;x4.beginPath();x4.arc(d.x,d.y,d.r,0,7);x4.fill();});
  // HUD
  if(!M4.quiz){
    x4.fillStyle='#dfe7ee';x4.font='13px sans-serif';
    x4.fillText(`露點溫度 Td ≈ ${Td.toFixed(1)}°C`,16,22);
    x4.fillStyle=cond?'#ff8a78':'#7be0c3';
    x4.fillText(cond?`牆面 ${TW}°C ≤ 露點 → 結露中(沒有任何漏水,牆照樣濕)`:`牆面 ${TW}°C > 露點 → 不結露`,16,40);
    $('n4').innerHTML='夏天冷氣房隔壁的牆、北向房間冬天的牆,常被誤判成漏水。把<b>濕度拉高、牆溫調低</b>看看露點怎麼決定一切。客訴現場第一件事:先量<b>牆面溫度與室內露點</b>,再決定要不要拆。';
  }
}

//=============== M5 檢測員模式 ===============
const c5=$('c5'),x5=c5.getContext('2d');
const CAUSES=['窗框滲漏','毛細上升(壁癌)','負水壓滲漏','冷凝結露'];
let M5={ans:0,tool:'moist',readings:[],sprayed:false,boost:0,done:false};
function m5New(){M5.ans=Math.random()*4|0;M5.readings=[];M5.sprayed=false;M5.boost=0;M5.done=false;
  $('n5').innerHTML='🕵️ 業主報案:「牆壁濕濕的」。用水分計點牆量測、開熱像儀看分佈、必要時灑水試驗,然後下診斷。';}
m5New();
$('next5').onclick=m5New;
document.querySelectorAll('#m5 [data-t]').forEach(b=>b.onclick=()=>{M5.tool=b.dataset.t;
  document.querySelectorAll('#m5 [data-t]').forEach(x=>x.classList.toggle('sel',x===b));});
$('spray5').onclick=()=>{ if(M5.done)return; M5.sprayed=true;
  if(M5.ans===0||M5.ans===2){M5.boost=0.35;$('n5').innerHTML='🚿 灑水10分鐘後:<b class="bad">讀值明顯上升!</b>濕度跟外部進水直接連動 → 是滲漏,不是冷凝/毛細。';}
  else {$('n5').innerHTML='🚿 灑水10分鐘後:讀值<b>沒有變化</b>。外牆進水被排除,往毛細或冷凝方向想。';}};
function moist5(x,y){ // 0..1
  const a=M5.ans;let m=0.06;
  if(a===0){const d=Math.hypot(x-185,y-185);m=Math.max(m,0.85*Math.exp(-d*d/6000)*(y>170?1:0.4));}
  if(a===1){m=Math.max(m,y>240?0.8:y>180?0.8*(1-(240-y)/60):0.05);}
  if(a===2){const d=Math.hypot(x-430,y-150);m=Math.max(m,0.8*Math.exp(-d*d/9000));}
  if(a===3){m=0.18+0.08*Math.sin(x*0.05)*Math.sin(y*0.07)+(y<150?0.06:0);}
  if((a===0||a===2)&&M5.sprayed)m=Math.min(1,m*(1+M5.boost));
  return m;
}
c5.addEventListener('pointerdown',e=>{
  if(M5.tool!=='moist'||M5.done)return;
  const r=c5.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*620,my=(e.clientY-r.top)/r.height*340;
  if(my>300)return;
  M5.readings.push({x:mx,y:my,v:moist5(mx,my)});
  if(M5.readings.length>8)M5.readings.shift();
});
document.querySelectorAll('#m5 [data-d]').forEach(b=>b.onclick=()=>{
  if(M5.done)return;M5.done=true;
  const ok=+b.dataset.d===M5.ans;
  const why=['濕痕集中在窗角下方放射狀,灑水後讀值上升 → 窗框界面進水。',
   '濕度集中牆腳、越高越乾、灑水無反應 → 牆腳毛細吸水+鹽分析晶(壁癌)。',
   '濕痕在牆中段單點放射,灑水後上升 → 水從背水面滲出,典型負水壓。',
   '整面均勻低濕度、表面溫度偏低、灑水無反應 → 露點結露,不是漏水。'][M5.ans];
  $('n5').innerHTML=(ok?'<span class="ok">✅ 診斷正確!</span>':'<span class="bad">❌ 誤診!正解:'+CAUSES[M5.ans]+'。</span>')+why+'　按「下一題」繼續。';
});
function m5Step(){
  x5.fillStyle='#1a1f25';x5.fillRect(0,0,620,340);
  x5.fillStyle='#23292f';x5.fillRect(0,300,620,40);
  // 窗
  x5.fillStyle='#2a3a48';x5.fillRect(60,60,130,120);
  x5.fillStyle='#16222e';x5.fillRect(70,70,110,100);
  if(M5.tool==='ir'){
    for(let gy=0;gy<300;gy+=15)for(let gx=0;gx<620;gx+=15){
      const m=moist5(gx+7,gy+7);
      const t=(M5.ans===3?17:24)-m*9; // 濕=冷
      const k=Math.max(0,Math.min(1,(t-12)/14));
      x5.fillStyle=`rgba(${k*255|0},${k*120|0},${(1-k)*255|0},0.45)`;
      x5.fillRect(gx,gy,15,15);
    }
    x5.fillStyle='#dfe7ee';x5.font='12px sans-serif';x5.fillText('熱像:藍=低溫(潮濕/結露面) 紅=常溫',16,330);
  } else {
    // 可見濕痕(淡)
    for(let gy=0;gy<300;gy+=10)for(let gx=0;gx<620;gx+=10){
      const m=moist5(gx+5,gy+5);
      if(m>0.25){x5.fillStyle=`rgba(30,50,70,${(m-0.25)*0.8})`;x5.fillRect(gx,gy,10,10);}
    }
    if(M5.ans===1){x5.fillStyle='rgba(230,230,220,0.5)';
      for(let k=0;k<40;k++)x5.fillRect((k*97)%600+10,260+(k*53)%35,2,2);} // 白華
  }
  // 讀值
  M5.readings.forEach(rd=>{
    x5.strokeStyle='#66D3C0';x5.beginPath();x5.arc(rd.x,rd.y,6,0,7);x5.stroke();
    x5.fillStyle='#0e3a31';x5.fillRect(rd.x+8,rd.y-20,52,18);
    x5.strokeStyle='#2a5a4a';x5.strokeRect(rd.x+8,rd.y-20,52,18);
    x5.fillStyle='#9ff0dd';x5.font='12px sans-serif';x5.fillText((rd.v*100).toFixed(0)+'%',rd.x+14,rd.y-7);
  });
  x5.fillStyle='#7d8c98';x5.font='12px sans-serif';x5.fillText('案發牆面(內含一種隱藏病因)',16,22);
}

//=============== 主迴圈 ===============
function loop(){
  requestAnimationFrame(loop);
  if(active==='m1')m1Step();
  else if(active==='m2')m2Step();
  else if(active==='m3')m3Step();
  else if(active==='m4')m4Step();
  else if(active==='m5')m5Step();
}
$('p1v').textContent=$('p1').value;
$('p2v').textContent='1.0 mm';
loop();
</script>
</body>
